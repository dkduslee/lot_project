<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세마포어 - 열람실 좌석 혼잡도 시스템</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        :root {
            --yu-navy: #002c5f;
            --yu-blue: #005aab;
            --yu-gold: #ffcf0e;
            --bg-light: #f5f7fa;
            --seat-green: #36b37e;
            --seat-red: #ff5630;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-light);
            color: #2d3748;
            margin: 0;
            padding: 40px 20px;
        }

        .dashboard-wrapper {
            max-width: 900px;
            margin: 0 auto;
        }

        .yu-header {
            background-color: #005aab;
            background-image: linear-gradient(rgba(123, 172, 228, 0.3),
                rgba(44, 90, 143, 0.3)),
            url("{{url_for('static', filename='yu_logo.png')}}");

            background-size: cover, 40% auto;
            background-position: center, right 20px center;
            background-repeat: no-repeat;

            color: white;
            padding: 40px 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0, 44, 95, 0.15);
        }

        .yu-header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .yu-header p {
            margin: 5px 0 0 0;
            opacity: 0.8;
            font-size: 0.95rem;
        }

        .btn-camera-view {
            background-color: #ffffff;
            color: var(--yu-navy);
            border: 2px solid transparent;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .btn-camera-view:hover {
            background-color: var(--yu-blue);
            color: white;
            transform: translateY(-2px);
        }

        .info-grid {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .info-card {
            flex: 1;
            background: white;
            padding: 24px;
            border-radius: 18px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            border: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .info-card-icon {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            background-color: #f1f5f9;
            color: var(--yu-blue);
        }

        .info-card-content h3 {
            margin: 0;
            font-size: 0.85rem;
            color: #718096;
            text-uppercase: uppercase;
            font-weight: 600;
        }

        .info-card-content p {
            margin: 4px 0 0 0;
            font-size: 1.6rem;
            font-weight: 700;
        }

        .room-panel {
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            border: 1px solid #e2e8f0;
        }

        .room-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .room-panel-header h2 {
            font-size: 1.25rem;
            font-weight: 700;
            margin: 0;
        }

        .seat-layout-grid {
            display: grid;
            gap: 16px;
            justify-content: center;
            padding: 10px;
        }

        .desk-seat {
            width: 68px;
            height: 68px;
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            position: relative;
            box-shadow: inset 0 -4px 0 rgba(0, 0, 0, 0.15);
            transition: all 0.2s ease;
        }

        .desk-seat .seat-label {
            font-size: 0.95rem;
        }

        .desk-seat .seat-badge {
            font-size: 0.65rem;
            opacity: 0.9;
            margin-top: 1px;
            background: rgba(25px, 25px, 25px, 0.2);
            padding: 2px 6px;
            border-radius: 20px;
        }

        .desk-seat.available {
            background-color: var(--seat-green);
        }

        .desk-seat.occupied {
            background-color: var(--seat-red);
            animation: customPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes customPop {
            0% {
                transform: scale(0.8);
            }

            100% {
                transform: scale(1);
            }
        }

        #toast-container {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .yu-toast {
            background: #ffffff;
            color: #1a202c;
            padding: 18px 24px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            border: 1px solid #e2e8f0;
            border-left: 5px solid #ecc94b;
            min-width: 300px;
            display: flex;
            gap: 15px;
            align-items: center;
            animation: slideInRight 0.3s ease, fadeOutLeft 0.4s ease 4.6s forwards;
        }

        .yu-toast.info {
            border-left-color: var(--yu-blue);
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes fadeOutLeft {
            to {
                transform: translateX(30px);
                opacity: 0;
            }
        }

        .custom-popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 44, 95, 0.6);
            backdrop-filter: blur(5px);
            z-index: 5000;
            align-items: center;
            justify-content: center;
        }

        .popup-window {
            background: white;
            border-radius: 24px;
            width: 90%;
            max-width: 600px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .popup-img-frame {
            width: 100%;
            max-height: 380px;
            object-fit: contain;
            border-radius: 14px;
            background: #1a202c;
            margin: 15px 0;
        }

        .btn-close-popup {
            background: #edf2f7;
            color: #4a5568;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-refresh-popup {
            background: var(--yu-blue);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div id="toast-container"></div>

    <div class="dashboard-wrapper">
        <div class="yu-header">
            <div>
                <h1>공용 공간 자리 혼잡도 관리 시스템</h1>
                <p><i class="fa-solid fa-graduation-cap me-1"></i> 영남대학교 컴퓨터공학과 — 팀 세마포어</p>
            </div>
            <button class="btn-camera-view" onclick="openDebugModal()">
                <i class="fa-solid fa-video me-1"></i> 카메라 확인하기
            </button>
        </div>

        <div class="info-grid">
            <div class="info-card">
                <div class="info-card-icon"><i class="fa-solid fa-id-card"></i></div>
                <div class="info-card-content">
                    <h3>현재 좌석 이용률</h3>
                    <p id="seat-summary">-- / --</p>
                </div>
            </div>
            <div class="info-card">
                <div class="info-card-icon" style="color: #ecc94b;"><i
                        class="fa-solid fa-temperature-three-quarters"></i></div>
                <div class="info-card-content">
                    <h3>실시간 실내 온도</h3>
                    <p id="temp-value" style="color: #e53e3e;">-- °C</p>
                </div>
            </div>
            <div class="info-card">
                <div class="info-card-icon" style="color: #3182ce;"><i class="fa-solid fa-droplet"></i></div>
                <div class="info-card-content">
                    <h3>실시간 실내 습도</h3>
                    <p id="hum-value" style="color: #3182ce;">-- %</p>
                </div>
            </div>
        </div>

        <div class="room-panel">
            <div class="room-panel-header">
                <h2><i class="fa-solid fa-chair me-2" style="color: var(--yu-navy);"></i>2층 제1열람실 배치도</h2>
                <div class="d-flex gap-3" style="font-size: 0.85rem; font-weight: 600;">
                    <div><span
                            style="display:inline-block; width:12px; height:12px; background:var(--seat-green); border-radius:3px; margin-right:4px;"></span>공석
                    </div>
                    <div><span
                            style="display:inline-block; width:12px; height:12px; background:var(--seat-red); border-radius:3px; margin-right:4px;"></span>이용중
                    </div>
                </div>
            </div>
            <div id="seat-layout" class="seat-layout-grid"></div>
        </div>
    </div>

    <div id="camera-modal" class="custom-popup-overlay">
        <div class="popup-window">
            <h3 class="m-0 fw-bold" style="font-size:1.2rem; color:var(--yu-navy);"><i
                    class="fa-solid fa-database me-2"></i>라즈베리파이 원격 영상</h3>
            <p class="text-muted small m-0 mt-1">YOLO 사물 탐지 노드가 실시간 가공 중인 `/debug/frame` 데이터 바인딩입니다.</p>
            <img id="frame-image" src="" alt="데이터 로드 중..." class="popup-img-frame">
            <div class="d-flex justify-content-center gap-2 mt-2">
                <button class="btn-close-popup" onclick="closeDebugModal()">창 닫기</button>
                <button class="btn-refresh-popup" onclick="refreshFrame()"><i
                        class="fa-solid fa-arrows-rotate me-1"></i>새로고침</button>
            </div>
        </div>
    </div>

    <script>
        const SERVER_URL = window.location.host;
        let globalSeatMatrix = [];

        async function fetchInitialData() {
            try {
                const response = await fetch(`http://${SERVER_URL}/get/live`);
                const data = await response.json();
                updateSensorUI(data.temp, data.hum);
                renderSeatGrid(data.seatList);
            } catch (error) {
                console.error("초기 로드 실패:", error);
            }
        }

        function updateSensorUI(temp, hum) {
            document.getElementById('temp-value').innerText = `${temp.toFixed(1)} °C`;
            document.getElementById('hum-value').innerText = `${hum.toFixed(1)} %`;
        }

        function updateSeatSummary() {
            let total = 0, occupied = 0;
            globalSeatMatrix.forEach(row => {
                row.forEach(isOccupied => {
                    total++;
                    if (isOccupied) occupied++;
                });
            });
            document.getElementById('seat-summary').innerText = `${occupied} / ${total} 석`;
        }

        function renderSeatGrid(seatList) {
            globalSeatMatrix = seatList;
            const gridContainer = document.getElementById('seat-layout');
            gridContainer.innerHTML = '';

            const rows = seatList.length;
            const cols = seatList[0].length;

            gridContainer.style.gridTemplateColumns = `repeat(${cols}, 68px)`;

            for (let x = 0; x < rows; x++) {
                for (let y = 0; y < cols; y++) {
                    const isOccupied = seatList[x][y];
                    const seatDiv = document.createElement('div');
                    seatDiv.id = `seat-${x}-${y}`;
                    seatDiv.className = `desk-seat ${isOccupied ? 'occupied' : 'available'}`;

                    seatDiv.innerHTML = `
                        <div class="seat-label">${x + 1}-${y + 1}</div>
                        <div class="seat-badge">${isOccupied ? '배정' : '공석'}</div>
                    `;
                    gridContainer.appendChild(seatDiv);
                }
            }
            updateSeatSummary();
        }

        function showNotification(title, message, type = 'warning') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `yu-toast ${type}`;

            const icon = type === 'info' ? 'fa-circle-info' : 'fa-triangle-exclamation';
            const iconColor = type === 'info' ? '#005aab' : '#ecc94b';

            toast.innerHTML = `
                <div style="font-size: 1.2rem; color: ${iconColor};"><i class="fa-solid ${icon}"></i></div>
                <div>
                    <div style="font-weight: 700; font-size: 0.9rem;">${title}</div>
                    <div style="font-size: 0.8rem; color: #718096; margin-top: 2px;">${message}</div>
                </div>
            `;
            container.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 5000);
        }

        function connectWebSocket() {
            const ws = new WebSocket(`ws://${SERVER_URL}/ws/notify`);

            ws.onmessage = function (event) {
                const data = JSON.parse(event.data);

                if (data.latestSeat) {
                    data.latestSeat.forEach(change => {
                        const seatElement = document.getElementById(`seat-${change.x}-${change.y}`);
                        if (seatElement) {
                            const seatName = `${change.x + 1}행 ${change.y + 1}열`;
                            globalSeatMatrix[change.x][change.y] = change.newStatus;

                            if (change.newStatus) {
                                seatElement.className = 'desk-seat occupied';
                                seatElement.querySelector('.seat-badge').innerText = '배정';
                                showNotification('좌석 이용 시작', `${seatName} 사용 등록되었습니다.`, 'info');
                            } else {
                                seatElement.className = 'desk-seat available';
                                seatElement.querySelector('.seat-badge').innerText = '공석';
                                showNotification('⚠️ 미사용 자동 반납', `${seatName} 좌석이 자동 반납되었습니다.`, 'warning');
                            }
                        }
                    });
                    updateSeatSummary();
                }
                else if (data.latestSensor) {
                    updateSensorUI(data.latestSensor.temp, data.latestSensor.hum);
                }
            };

            ws.onclose = function () {
                setTimeout(connectWebSocket, 3000);
            };
        }

        function openDebugModal() {
            document.getElementById('camera-modal').style.display = 'flex';
            refreshFrame();
        }

        function closeDebugModal() {
            document.getElementById('camera-modal').style.display = 'none';
        }

        function refreshFrame() {
            const imgElement = document.getElementById('frame-image');
            imgElement.src = `http://${SERVER_URL}/debug/frame?t=${new Date().getTime()}`;
        }

        window.onload = function () {
            fetchInitialData();
            connectWebSocket();
        };
    </script>
</body>

</html>
